<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Cliente</title>
</head>
<body>

    <h1>Novo Cliente</h1>

    <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">

        <label>Nome do Responsável:</label>
        <input type="text" th:field="*{nomeResponsavel}" />

        <label>CPF:</label>
        <input type="text" id="cpfInput" maxlength="14" placeholder="000.000.000-00" />
        <input type="hidden" th:field="*{cpf}" id="cpfHidden" />

        <label>Telefone:</label>
        <input type="text" id="telefoneInput" maxlength="15" placeholder="(00) 00000-0000" />
        <input type="hidden" th:field="*{telefone}" id="telefoneHidden" />

        <label>Endereço:</label>
        <input type="text" th:field="*{endereco}" />

        <label>Número do Contrato:</label>
        <input type="text" th:field="*{numeroContrato}" />

		<p th:if="${erro}" th:text="${erro}" style="color: red;"></p>
		<label>Unidade:</label>
		<select name="unidadeId">
		    <option th:each="unidade : ${unidades}"
		            th:value="${unidade.id}"
		            th:text="${unidade.nome}">
		    </option>
		</select>

        <button type="submit">Salvar</button>
    </form>

    <a href="/clientes">Voltar</a>

    <script>
        function mascaraCpf(valor) {
            return valor
                .replace(/\D/g, '')
                .replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})(\d{1,2})/, '$1-$2')
                .replace(/(-\d{2})\d+?$/, '$1');
        }

        function mascaraTelefone(valor) {
            return valor
                .replace(/\D/g, '')
                .replace(/(\d{2})(\d)/, '($1) $2')
                .replace(/(\d{5})(\d)/, '$1-$2')
                .replace(/(-\d{4})\d+?$/, '$1');
        }

        document.getElementById('cpfInput').addEventListener('input', function() {
            this.value = mascaraCpf(this.value);
            document.getElementById('cpfHidden').value = this.value.replace(/\D/g, '');
        });

        document.getElementById('telefoneInput').addEventListener('input', function() {
            this.value = mascaraTelefone(this.value);
            document.getElementById('telefoneHidden').value = this.value.replace(/\D/g, '');
        });
    </script>

</body>
</html>
